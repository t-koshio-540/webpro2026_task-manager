<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高度なタスク管理システム</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>📋 タスク管理システム</h1>
    </header>

    <main class="container">
      <!-- 1. すべての未完了タスクエリア -->
      <section class="panel">
        <h2>未完了タスク</h2>
        <p class="instruction">
          表のヘッダーをクリックすると、その列で昇順・降順ソートが可能です。
        </p>
        <div class="table-wrapper">
          <table id="incomplete-tasks-table">
            <thead>
              <tr>
                <th data-sort="title">タイトル ⇅</th>
                <th data-sort="due_date">期限 ⇅</th>
                <th data-sort="genre_name">ジャンル ⇅</th>
                <th data-sort="priority">重要度 ⇅</th>
                <th data-sort="comment">コメント ⇅</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="incomplete-tasks-list">
              <!-- JSで動的にタスク行が生成されます -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- 2. 中段：登録フォーム ＆ ジャンル改廃パーツ -->
      <div class="form-grid">
        <!-- タスク登録フォーム -->
        <section class="panel form-panel">
          <h2>タスク登録フォーム</h2>
          <form id="task-form">
            <div class="form-group">
              <label for="task-title"
                >タイトル <span class="required">*</span></label
              >
              <input
                type="text"
                id="task-title"
                required
                placeholder="やることの概要を入力"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="task-date"
                  >期限(日付) <span class="required">*</span></label
                >
                <input type="date" id="task-date" required />
              </div>
              <div class="form-group">
                <label for="task-time">期限(時刻, 任意)</label>
                <input type="time" id="task-time" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="task-genre">ジャンル</label>
                <select id="task-genre">
                  <!-- JSで動的にジャンル選択肢を追加 -->
                </select>
              </div>
              <div class="form-group">
                <label for="task-priority"
                  >重要度 <span class="required">*</span></label
                >
                <select id="task-priority" required>
                  <option value="1">1 (仮)</option>
                  <option value="2">2 (低)</option>
                  <option value="3" selected>3 (中)</option>
                  <option value="4">4 (高)</option>
                  <option value="5">5 (緊急)</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="task-comment">コメント(任意)</label>
              <textarea
                id="task-comment"
                rows="2"
                placeholder="詳細メモなど"
              ></textarea>
            </div>
            <button type="submit" class="btn btn-primary">
              タスクを登録する
            </button>
          </form>
        </section>

        <!-- ジャンル改廃（管理）パーツ -->
        <section class="panel genre-panel">
          <h2>ジャンル管理（追加・削除）</h2>

          <!-- 新規ジャンルの追加フォーム -->
          <form id="genre-form" class="inline-form">
            <input
              type="text"
              id="new-genre-name"
              placeholder="新しいジャンル名"
              required
            />
            <button type="submit" class="btn btn-secondary">追加</button>
          </form>

          <hr />

          <!-- 登録済みジャンルのリスト（削除ボタン付き） -->
          <h3>既存のジャンル一覧</h3>
          <ul id="genre-management-list">
            <!-- JSで動的にジャンルリストを生成 -->
          </ul>
        </section>
      </div>

      <!-- 3. ジャンルごとのタスク一覧（複数配置・動的追加可能） -->
      <section class="panel">
        <div class="genre-section-header">
          <h2>📁 ジャンル別タスクビュー</h2>
          <button id="add-genre-view-btn" class="btn btn-secondary">
            ＋ ビューを追加する
          </button>
        </div>
        <p class="instruction">
          ※「ビューを追加」を押すと、選択した特定のジャンルだけを抽出表示するテーブルを何個でも追加配置できます。
        </p>

        <!-- ジャンル別の表示エリアが追加されるコンテナ -->
        <div id="dynamic-genre-containers">
          <!-- JSでここに動的なビューブロックが追加されます -->
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
